@if (overlay()) {
  <div class="fuse-spinner__overlay">
    <span
      class="fuse-spinner fuse-spinner--{{ size() }}"
      [style.border-top-color]="color() || null"
    ></span>
  </div>
} @else {
  <span
    class="fuse-spinner fuse-spinner--{{ size() }}"
    [style.border-top-color]="color() || null"
  ></span>
}
