<div class="fuse-confirm" [class]="'fuse-confirm--' + (options.type ?? 'info')">
  <!-- Icon -->
  <div class="fuse-confirm__icon" aria-hidden="true">
    @switch (options.type ?? 'info') {
      @case ('danger') {
        <svg xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
          <path fill-rule="evenodd"
                d="M9.401 3.003c1.155-2 4.043-2 5.197 0l7.355 12.748c1.154 2-.29 4.5-2.599 4.5H4.645c-2.309 0-3.752-2.5-2.598-4.5L9.4 3.003zM12 8.25a.75.75 0 01.75.75v3.75a.75.75 0 01-1.5 0V9a.75.75 0 01.75-.75zm0 8.25a.75.75 0 100-1.5.75.75 0 000 1.5z"
                clip-rule="evenodd" />
        </svg>
      }
      @case ('warning') {
        <svg xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
          <path fill-rule="evenodd"
                d="M9.401 3.003c1.155-2 4.043-2 5.197 0l7.355 12.748c1.154 2-.29 4.5-2.599 4.5H4.645c-2.309 0-3.752-2.5-2.598-4.5L9.4 3.003zM12 8.25a.75.75 0 01.75.75v3.75a.75.75 0 01-1.5 0V9a.75.75 0 01.75-.75zm0 8.25a.75.75 0 100-1.5.75.75 0 000 1.5z"
                clip-rule="evenodd" />
        </svg>
      }
      @default {
        <!-- info (default) -->
        <svg xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
          <path fill-rule="evenodd"
                d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12zm8.706-1.442c1.146-.573 2.437.463 2.126 1.706l-.709 2.836.042-.02a.75.75 0 01.67 1.34l-.04.022c-1.147.573-2.438-.463-2.127-1.706l.71-2.836-.042.02a.75.75 0 11-.671-1.34l.041-.022zM12 9a.75.75 0 100-1.5A.75.75 0 0012 9z"
                clip-rule="evenodd" />
        </svg>
      }
    }
  </div>

  <!-- Body -->
  <div class="fuse-confirm__body">
    <h2 class="fuse-confirm__title">{{ options.title }}</h2>
    <p class="fuse-confirm__message">{{ options.message }}</p>
  </div>

  <!-- Actions -->
  <div class="fuse-confirm__actions">
    <button
      type="button"
      class="fuse-confirm__btn fuse-confirm__btn--cancel"
      (click)="cancel()"
    >
      {{ options.cancelLabel ?? 'Cancel' }}
    </button>
    <button
      type="button"
      class="fuse-confirm__btn fuse-confirm__btn--confirm"
      (click)="confirm()"
    >
      {{ options.confirmLabel ?? 'Confirm' }}
    </button>
  </div>
</div>
