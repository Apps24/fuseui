<div class="fuse-popover__trigger"
     role="button"
     tabindex="0"
     (click)="onTriggerClick()"
     (keydown.enter)="onTriggerClick()"
     (keydown.space)="onTriggerClick()"
     (mouseenter)="onTriggerMouseEnter()"
     (mouseleave)="onTriggerMouseLeave()">
  <ng-content select="[fusePopoverTrigger]"></ng-content>
</div>

@if (isOpen()) {
  <div #panel
       class="fuse-popover__panel"
       [attr.data-placement]="placement()">
    <ng-content select="[fusePopoverContent]"></ng-content>
  </div>
}
