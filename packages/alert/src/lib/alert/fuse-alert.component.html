@if (!dismissed()) {
  <div class="fuse-alert__inner">

    <!-- Icon -->
    <span class="fuse-alert__icon" aria-hidden="true">
      @switch (type()) {
        @case ('info') {
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="currentColor" width="20" height="20">
            <path fill-rule="evenodd"
              d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75S21.75 6.615 21.75 12
                 17.385 21.75 12 21.75 2.25 17.385 2.25 12zm8.706-1.442c1.146-.573
                 2.437.463 2.126 1.706l-.709 2.836.042-.02a.75.75 0 01.67 1.34l-.04.022c-1.147.573
                 -2.438-.463-2.127-1.706l.71-2.836-.042.02a.75.75 0 11-.671-1.34l.041-.022zM12
                 9a.75.75 0 100-1.5.75.75 0 000 1.5z" clip-rule="evenodd" />
          </svg>
        }
        @case ('success') {
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="currentColor" width="20" height="20">
            <path fill-rule="evenodd"
              d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75S21.75 6.615 21.75 12
                 17.385 21.75 12 21.75 2.25 17.385 2.25 12zm13.36-1.814a.75.75
                 0 10-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 00-1.06
                 1.06l2.25 2.25a.75.75 0 001.14-.094l3.75-5.25z"
              clip-rule="evenodd" />
          </svg>
        }
        @case ('warning') {
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="currentColor" width="20" height="20">
            <path fill-rule="evenodd"
              d="M9.401 3.003c1.155-2 4.043-2 5.197 0l7.355 12.748c1.154 2-.29
                 4.5-2.599 4.5H4.645c-2.309 0-3.752-2.5-2.598-4.5L9.4
                 3.003zM12 8.25a.75.75 0 01.75.75v3.75a.75.75 0 01-1.5 0V9a.75.75
                 0 01.75-.75zm0 8.25a.75.75 0 100-1.5.75.75 0 000 1.5z"
              clip-rule="evenodd" />
          </svg>
        }
        @case ('error') {
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="currentColor" width="20" height="20">
            <path fill-rule="evenodd"
              d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75
                 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zm-1.72 6.97a.75.75
                 0 10-1.06 1.06L10.94 12l-1.72 1.72a.75.75 0 101.06 1.06L12
                 13.06l1.72 1.72a.75.75 0 101.06-1.06L13.06 12l1.72-1.72a.75.75
                 0 10-1.06-1.06L12 10.94l-1.72-1.72z" clip-rule="evenodd" />
          </svg>
        }
      }
    </span>

    <!-- Body -->
    <div class="fuse-alert__body">
      @if (title()) {
        <span class="fuse-alert__title">{{ title() }}</span>
      }
      <span class="fuse-alert__message"><ng-content></ng-content></span>
    </div>

    <!-- Close button -->
    @if (closable()) {
      <button
        type="button"
        class="fuse-alert__close"
        aria-label="Dismiss alert"
        (click)="dismiss()"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
             fill="currentColor" width="16" height="16">
          <path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75
                   0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06
                   10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z" />
        </svg>
      </button>
    }

  </div>
}
